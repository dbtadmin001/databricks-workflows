name: Deploy to AWS EKS

on:
  push:
    branches:
      - main
    paths:
      - 'src/core/**'
      - 'projects/pos_retail/**'
      - 'platforms/aws/**'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

concurrency:
  group: deploy-aws-${{ github.ref }}-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  shared-ci:
    name: Run shared CI checks
    uses: ./.github/workflows/ci-shared.yml
  
  deploy:
    name: Deploy to AWS EKS (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: shared-ci
    environment: ${{ inputs.environment || 'aws-dev' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPOSITORY: pos-retail-spark
      CLUSTER_NAME: pos-retail-${{ inputs.environment || 'dev' }}
      TARGET_ENV: ${{ inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Docker image
        id: build-image
        working-directory: .
        run: |
          # Generate image tag from git SHA
          IMAGE_TAG="${{ github.sha }}"
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          IMAGE_URI_LATEST="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          
          echo "Building Docker image..."
          docker build \
            -f platforms/aws/docker/Dockerfile \
            -t ${IMAGE_URI} \
            -t ${IMAGE_URI_LATEST} \
            .
          
          echo "Pushing to ECR..."
          docker push ${IMAGE_URI}
          docker push ${IMAGE_URI_LATEST}
          
          echo "image=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
          
          # Verify connection
          kubectl cluster-info
      
      - name: Update and deploy SparkApplication manifests
        working-directory: platforms/aws/k8s/manifests
        run: |
          # Replace placeholders in manifests
          find . -name "*.yaml" -type f -exec sed -i \
            -e "s|<ECR_REGISTRY>|${{ env.ECR_REGISTRY }}|g" \
            -e "s|<GIT_SHA>|${{ steps.build-image.outputs.image_tag }}|g" \
            {} \;
          
          # Apply manifests
          echo "Deploying Bronze jobs..."
          kubectl apply -f bronze/
          
          echo "Deploying Silver jobs..."
          kubectl apply -f silver/
          
          echo "Deploying Gold jobs..."
          kubectl apply -f gold/
      
      - name: Wait for SparkApplications to be created
        run: |
          echo "Waiting for SparkApplication CRDs to be created..."
          sleep 10
          
          kubectl get sparkapplications -n spark-jobs
      
      - name: Verify Spark Operator
        run: |
          echo "Checking Spark Operator status..."
          kubectl get pods -n spark-operator
          
          echo "Checking SparkApplication CRDs..."
          kubectl get crd sparkapplications.sparkoperator.k8s.io
      
      - name: Deployment summary
        if: always()
        run: |
          echo "### ✅ AWS EKS Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: AWS EKS" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.TARGET_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: ${{ env.CLUSTER_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SparkApplications deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- pos-retail-bronze (Bronze ingestion)" >> $GITHUB_STEP_SUMMARY
          echo "- pos-retail-silver (Silver enrichment)" >> $GITHUB_STEP_SUMMARY
          echo "- pos-retail-gold (Gold aggregation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View jobs:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl get sparkapplications -n spark-jobs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
