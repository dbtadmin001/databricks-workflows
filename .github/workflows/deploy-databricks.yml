name: Deploy to Databricks

on:
  push:
    branches:
      - main
    paths:
      - 'src/core/**'
      - 'projects/pos_retail/**'
      - 'platforms/databricks/**'
      - '.github/workflows/deploy-databricks.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - test
          - prod

concurrency:
  group: deploy-databricks-${{ github.ref }}-${{ inputs.environment || 'prod' }}
  cancel-in-progress: false

jobs:
  shared-ci:
    name: Run shared CI checks
    uses: ./.github/workflows/ci-shared.yml
  
  deploy:
    name: Deploy to Databricks (${{ inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: shared-ci
    environment: ${{ inputs.environment || 'production' }}
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      TARGET_ENV: ${{ inputs.environment || 'prod' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
      
      - name: Validate bundle before deploy
        working-directory: platforms/databricks/bundles
        run: |
          databricks bundle validate -t $TARGET_ENV \
            --var warehouse_id=${{ vars.DATABRICKS_WAREHOUSE_ID }}
      
      - name: Deploy bundle
        working-directory: platforms/databricks/bundles
        run: |
          databricks bundle deploy -t $TARGET_ENV \
            --var warehouse_id=${{ vars.DATABRICKS_WAREHOUSE_ID }}
      
      - name: Show deployed resources
        working-directory: platforms/databricks/bundles
        run: |
          databricks bundle summary -t $TARGET_ENV \
            --var warehouse_id=${{ vars.DATABRICKS_WAREHOUSE_ID }}
      
      - name: Set up Python for dbt
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dbt and dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      
      - name: Install dbt packages
        working-directory: platforms/databricks/dbt
        run: dbt deps
      
      - name: Run dbt tests on Gold tables
        working-directory: platforms/databricks/dbt
        run: |
          dbt test --target $TARGET_ENV
        continue-on-error: true
        id: dbt_tests
      
      - name: Deployment summary
        run: |
          echo "### ✅ Databricks Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Databricks" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: $TARGET_ENV" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: pos_retail" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Resources deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- Lakeflow Spark Declarative Pipeline (Bronze → Silver → Gold)" >> $GITHUB_STEP_SUMMARY
          echo "- Lakeview Dashboard (2 pages, 14+ widgets)" >> $GITHUB_STEP_SUMMARY
          echo "- SQL Analytics Notebook" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.dbt_tests.outcome }}" == "success" ]; then
            echo "### ✅ dbt Tests Passed" >> $GITHUB_STEP_SUMMARY
            echo "All Gold layer data quality tests passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ dbt Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "Some Gold layer tests failed. Review dbt test output above." >> $GITHUB_STEP_SUMMARY
          fi
