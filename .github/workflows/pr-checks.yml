name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  shared-ci:
    name: Run shared CI checks
    uses: ./.github/workflows/ci-shared.yml
  
  databricks-bundle-validate:
    name: Validate Databricks bundle
    runs-on: ubuntu-latest
    needs: shared-ci
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
      
      - name: Validate Databricks bundle (dev target)
        working-directory: platforms/databricks/bundles
        run: |
          databricks bundle validate -t dev \
            --var warehouse_id=${{ vars.DATABRICKS_WAREHOUSE_ID || 'placeholder' }}
      
      - name: PR check summary
        run: |
          echo "### ✅ PR Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Shared CI: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Databricks bundle validation: Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ready to merge!" >> $GITHUB_STEP_SUMMARY
