bundle:
  name: pos_retail_analytics

include:
  - resources/*.yml

sync:
  include:
    - transformations/**
    - notebooks/**
    - dashboards/**
    - scripts/**
    - tests/**
    - requirements-dev.txt
  exclude:
    - dashboards/*.lvdash.json

variables:
  warehouse_id:
    description: SQL warehouse used to publish dashboard datasets.
  catalog:
    description: Unity Catalog catalog for deployed pipeline outputs.
    default: workspace
  schema:
    description: Unity Catalog schema for deployed pipeline outputs.
    default: default
  dashboard_parent_path:
    description: Workspace folder where the dashboard asset is deployed.
    default: /Workspace/Users/alutakome@nda.or.ug
  pipeline_name:
    description: Deployed pipeline display name.
    default: POS Retail — Medallion Ingestion
  dashboard_name:
    description: Deployed dashboard display name.
    default: POS Retail — Bakehouse Analytics

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: default
      dashboard_parent_path: /Workspace/Users/${workspace.current_user.userName}
    resources:
      pipelines:
        pos_retail_medallion:
          development: true
          continuous: false
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/alutakome@nda.or.ug/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: alutakome@nda.or.ug
        level: CAN_MANAGE
    resources:
      pipelines:
        pos_retail_medallion:
          development: false
          continuous: false
