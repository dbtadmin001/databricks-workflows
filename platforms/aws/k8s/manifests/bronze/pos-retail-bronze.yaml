apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pos-retail-bronze
  namespace: spark-jobs
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "<ECR_REGISTRY>/pos-retail-spark:<GIT_SHA>"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work-dir/src/core/transformations/bronze/bronze_tables.py
  
  sparkVersion: "3.5.0"
  
  restartPolicy:
    type: OnFailure
    onFailureRetries: 2
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 1
  
  driver:
    cores: 1
    memory: "2g"
    labels:
      version: "3.5.0"
      app: "pos-retail-bronze"
    serviceAccount: spark-job-sa
    env:
      - name: AWS_REGION
        value: "us-east-1"
      - name: DELTA_LAKE_PATH
        value: "s3a://pos-retail-dev/delta-lake"
    
  executor:
    cores: 2
    instances: 2
    memory: "4g"
    labels:
      version: "3.5.0"
      app: "pos-retail-bronze"
  
  sparkConf:
    # Delta Lake
    "spark.sql.extensions": "io.delta.sql.DeltaSparkSessionExtension"
    "spark.sql.catalog.spark_catalog": "org.apache.spark.sql.delta.catalog.DeltaCatalog"
    
    # S3 configuration
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "com.amazonaws.auth.WebIdentityTokenCredentialsProvider"
    
    # Performance tuning
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    
    # Logging
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "s3a://pos-retail-dev/spark-logs"
  
  hadoopConf:
    "fs.s3a.connection.ssl.enabled": "true"
    "fs.s3a.endpoint": "s3.us-east-1.amazonaws.com"
