resources:
  jobs:
    project_10_adr_pharmacovigilance_end_to_end_job:
      name: "[${bundle.target}] project_10_adr_pharmacovigilance_end_to_end"
      environments:
        - environment_key: Default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
              - "plotly>=5.24,<7"
      tasks:
        - task_key: bronze_ingestion
          environment_key: Default
          max_retries: 2
          min_retry_interval_millis: 30000
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/01_bronze.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              raw_dir: "${workspace.file_path}/data/raw"
              landing_volume: "${var.landing_volume}"
        - task_key: silver_transform
          depends_on: [{task_key: bronze_ingestion}]
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/02_silver.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              raw_dir: "${workspace.file_path}/data/raw"
        - task_key: gold_wap_publish
          depends_on: [{task_key: silver_transform}]
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/03_gold_wap.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
        - task_key: sql_validation
          depends_on: [{task_key: gold_wap_publish}]
          timeout_seconds: 300
          sql_task:
            warehouse_id: "${var.sql_warehouse_id}"
            file:
              path: ../sql/validate_outputs.sql
            parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
        - task_key: pharmacovigilance_dashboard
          depends_on: [{task_key: sql_validation}]
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/04_dashboard.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
      permissions:
        - service_principal_name: ${var.automation_service_principal_name}
          level: CAN_MANAGE
