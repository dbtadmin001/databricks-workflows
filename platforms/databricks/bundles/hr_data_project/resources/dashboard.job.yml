resources:
  jobs:
    hr_data_project_dashboard_job:
      name: "${var.environment_label} | hr_data_project | Analytics"
      tags:
        managed_by: data-automation-services
        automation_owner: data-automation-services
        environment: "${bundle.target}"
        project_id: hr_data_project
        workload: analytics
        asset_class: dashboard
      environments:
        - environment_key: Default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
              - "plotly>=5.24,<7"
      tasks:
        - task_key: 01_publish_analytics
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/04_dashboard.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
      permissions:
        - service_principal_name: ${var.automation_service_principal_name}
          level: CAN_MANAGE
