resources:
  jobs:
    hr_data_project_end_to_end_job:
      name: "${var.environment_label} | hr_data_project | Medallion"
      tags:
        managed_by: data-automation-services
        automation_owner: data-automation-services
        environment: "${bundle.target}"
        project_id: hr_data_project
        workload: medallion
        asset_class: data_pipeline
      max_concurrent_runs: 1
      parameters:
        - {name: from_stage, default: bronze}
        - {name: to_stage, default: gold}
        - {name: force_stage, default: ""}
        - {name: resume, default: "true"}
        - {name: source_fingerprint, default: ""}
        - {name: configuration_hash, default: ""}
        - {name: code_sha, default: "${var.code_sha}"}
        - {name: source_base_path, default: "${workspace.file_path}/data/raw"}
      environments:
        - environment_key: Default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
              - "pypdf>=5,<7"
              - "plotly>=5.24,<7"
      tasks:
        - task_key: 01_bronze_ingestion
          environment_key: Default
          max_retries: 2
          min_retry_interval_millis: 30000
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/00_orchestrate.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              landing_volume: "${var.landing_volume}"
              source_base_path: "${workspace.file_path}/data/raw"
              from_stage: "bronze"
              to_stage: "bronze"
              force_stage: "{{job.parameters.force_stage}}"
              resume: "{{job.parameters.resume}}"
              source_fingerprint: "{{job.parameters.source_fingerprint}}"
              configuration_hash: "{{job.parameters.configuration_hash}}"
              code_sha: "{{job.parameters.code_sha}}"
        - task_key: 02_silver_transform
          depends_on: [{task_key: 01_bronze_ingestion}]
          environment_key: Default
          max_retries: 2
          min_retry_interval_millis: 30000
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/00_orchestrate.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              landing_volume: "${var.landing_volume}"
              source_base_path: "${workspace.file_path}/data/raw"
              from_stage: "silver"
              to_stage: "silver"
              force_stage: "{{job.parameters.force_stage}}"
              resume: "{{job.parameters.resume}}"
              source_fingerprint: "{{job.parameters.source_fingerprint}}"
              configuration_hash: "{{job.parameters.configuration_hash}}"
              code_sha: "{{job.parameters.code_sha}}"
        - task_key: 03_gold_wap_publish
          depends_on: [{task_key: 02_silver_transform}]
          environment_key: Default
          max_retries: 2
          min_retry_interval_millis: 30000
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/00_orchestrate.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              landing_volume: "${var.landing_volume}"
              source_base_path: "${workspace.file_path}/data/raw"
              from_stage: "gold"
              to_stage: "gold"
              force_stage: "{{job.parameters.force_stage}}"
              resume: "{{job.parameters.resume}}"
              source_fingerprint: "{{job.parameters.source_fingerprint}}"
              configuration_hash: "{{job.parameters.configuration_hash}}"
              code_sha: "{{job.parameters.code_sha}}"
        - task_key: 04_sql_validation
          depends_on: [{task_key: 03_gold_wap_publish}]
          timeout_seconds: 300
          sql_task:
            warehouse_id: "${var.sql_warehouse_id}"
            file:
              path: ../sql/validate_outputs.sql
            parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
        - task_key: 05_publish_analytics
          depends_on: [{task_key: 04_sql_validation}]
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/04_dashboard.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
      permissions:
        - service_principal_name: ${var.automation_service_principal_name}
          level: CAN_MANAGE
