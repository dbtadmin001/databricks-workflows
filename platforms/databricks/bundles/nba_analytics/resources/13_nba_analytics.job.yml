resources:
  jobs:
    project_13_nba_analytics_end_to_end_job:
      name: "${var.environment_label} | 13_nba_analytics | Analytics"
      tags:
        managed_by: data-automation-services
        automation_owner: data-automation-services
        environment: "${bundle.target}"
        project_id: 13_nba_analytics
        workload: medallion
        asset_class: data_pipeline
      max_concurrent_runs: 1
      environments:
        - environment_key: Default
          spec:
            environment_version: "2"
            dependencies:
              - "numpy>=1.26,<2"
              - "pyarrow>=14.0.2,<15"
              - "plotly>=5.24,<7"
              - "pandas>=2.0.0"
      tasks:
        - task_key: bronze_ingestion
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/01_bronze.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "medallion"
              landing_volume: "${var.landing_volume}"

        - task_key: silver_transform
          depends_on: [{task_key: bronze_ingestion}]
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/02_silver.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: gold_wap_publish
          depends_on: [{task_key: silver_transform}]
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/03_gold.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: sql_validation
          depends_on: [{task_key: gold_wap_publish}]
          timeout_seconds: 300
          sql_task:
            warehouse_id: "${var.sql_warehouse_id}"
            file:
              path: ../sql/validation/gold_validation.sql
            parameters:
              catalog: "${var.catalog}"
              schema: "medallion"

        - task_key: nba_analytics_dashboard
          depends_on: [{task_key: sql_validation}]
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ../src/notebooks/04_dashboard.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "medallion"

      permissions:
        - service_principal_name: ${var.automation_service_principal_name}
          level: CAN_MANAGE
