resources:
  jobs:
    project_12_pos_inventory_analytics_dashboard_job:
      name: "${var.environment_label} | 12_pos_inventory_analytics | Analytics"
      tags:
        managed_by: data-automation-services
        automation_owner: data-automation-services
        environment: "${bundle.target}"
        project_id: 12_pos_inventory_analytics
        workload: analytics
        asset_class: dashboard
      environments:
        - environment_key: Default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
              - "plotly>=5.24,<7"
      tasks:
        - task_key: 01_publish_analytics
          environment_key: Default
          timeout_seconds: 600
          notebook_task:
            notebook_path: ${workspace.root_path}/projects/pos_inventory_analytics/entry_points/dashboard.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
